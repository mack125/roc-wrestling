<script>
document.addEventListener('DOMContentLoaded', function() {
    function enableSound(video) {
        video.muted = false;
        video.volume = 1.0;
        video.play();
    }
    function muteSound(video) {
        video.muted = true;
    }
    function showFullscreenWithNav(video) {
        // Create overlay
        var overlay = document.createElement('div');
        overlay.style.position = 'fixed';
        overlay.style.top = '0';
        overlay.style.left = '0';
        overlay.style.width = '100vw';
        overlay.style.height = '100vh';
        overlay.style.background = 'rgba(0,0,0,0.95)';
        overlay.style.zIndex = '9999';
        overlay.style.display = 'flex';
        overlay.style.flexDirection = 'column';
        overlay.style.alignItems = 'center';
        overlay.style.justifyContent = 'center';
        // Nav bar
        var nav = document.createElement('div');
        nav.style.position = 'absolute';
        nav.style.top = '0';
        nav.style.left = '0';
        nav.style.width = '100%';
        nav.style.background = 'rgba(20,30,50,0.95)';
        nav.style.display = 'flex';
        nav.style.justifyContent = 'flex-start';
        nav.style.alignItems = 'center';
        nav.style.padding = '12px 24px';
        nav.style.gap = '18px';
        // Home button
        var homeBtn = document.createElement('a');
        homeBtn.href = './index.html';
        homeBtn.textContent = 'Home';
        homeBtn.style.color = '#b0c4de';
        homeBtn.style.fontWeight = 'bold';
        homeBtn.style.fontSize = '1.2rem';
        homeBtn.style.textDecoration = 'underline';
        homeBtn.style.marginRight = '18px';
        nav.appendChild(homeBtn);
        // Close button
        var closeBtn = document.createElement('button');
        closeBtn.textContent = 'Close';
        closeBtn.style.marginLeft = 'auto';
        closeBtn.style.background = '#222';
        closeBtn.style.color = '#b0c4de';
        closeBtn.style.fontWeight = 'bold';
        closeBtn.style.fontSize = '1.1rem';
        closeBtn.style.border = 'none';
        closeBtn.style.padding = '6px 18px';
        closeBtn.style.borderRadius = '8px';
        closeBtn.style.cursor = 'pointer';
        nav.appendChild(closeBtn);
        overlay.appendChild(nav);
        // Fullscreen video
        var fsVideo = video.cloneNode(true);
        fsVideo.style.width = '90vw';
        fsVideo.style.maxWidth = '900px';
        fsVideo.style.height = 'auto';
        fsVideo.style.borderRadius = '18px';
        fsVideo.style.marginTop = '60px';
        fsVideo.controls = true;
        fsVideo.muted = false;
        fsVideo.volume = 1.0;
        fsVideo.autoplay = true;
        fsVideo.currentTime = video.currentTime;
        fsVideo.play();
        overlay.appendChild(fsVideo);
        document.body.appendChild(overlay);
        closeBtn.onclick = function() {
            fsVideo.pause();
            overlay.remove();
        };
    }
    var leftVideo = document.getElementById('header-video-left');
    var rightVideo = document.getElementById('header-video-right');
    [leftVideo, rightVideo].forEach(function(video) {
        if (!video) return;
        video.muted = true;
        video.autoplay = true;
        video.play();
        video.addEventListener('mouseenter', function() { enableSound(video); });
        video.addEventListener('mouseleave', function() { muteSound(video); });
        video.addEventListener('click', function() { enableSound(video); showFullscreenWithNav(video); });
    });
    // --- Intersection Observer for scroll-based video control ---
    const videos = [
        document.getElementById('header-video-left'),
        document.getElementById('header-video-right'),
        document.querySelector('#highlight-video video')
    ].filter(Boolean);

    videos.forEach(video => {
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;
        video.load();
    });

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const video = entry.target;
            if (entry.isIntersecting) {
                // Pause all other videos and mute them
                videos.forEach(v => {
                    if (v !== video) {
                        v.pause();
                        v.muted = true;
                    }
                });
                // Play and unmute the current video
                video.muted = false;
                video.play();
            } else {
                // Pause and mute when out of view
                video.pause();
                video.muted = true;
            }
        });
    }, { threshold: 0.5 }); // 50% of video must be visible

    videos.forEach(video => observer.observe(video));
    // --- End Intersection Observer ---
});
</script>

<script>
// Simple SPA loader
function loadPage(page) {
    fetch(page)
        .then(response => response.text())
        .then(html => {
            document.getElementById('main-content').innerHTML = html;
            window.scrollTo(0, 0);
        });
}

// Set up navigation to load pages dynamically
document.addEventListener('DOMContentLoaded', function() {
    // Load home.html by default
    loadPage('home.html');

    // Intercept navbar and menu links
    document.body.addEventListener('click', function(e) {
        if (e.target.matches('a.nav-link-custom')) {
            const href = e.target.getAttribute('href');
            if (href && (href.endsWith('.html') || href === 'home.html')) {
                e.preventDefault();
                loadPage(href);
            }
        }
    });
});
</script>
